name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        run: dotnet restore AITravelPlanner.API.sln
      - name: Build
        run: dotnet build AITravelPlanner.API.sln -c Release --no-restore
      - name: Test
        run: dotnet test AITravelPlanner.API.sln -c Release --no-build

  ai-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r AITravelPlanner.AIService/requirements.txt
      - name: Compile
        run: python -m compileall AITravelPlanner.AIService

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: npm install
        working-directory: AITravelPlanner.Frontend
      - name: Build
        run: npm run build
        working-directory: AITravelPlanner.Frontend

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f AITravelPlanner.API/Dockerfile -t aitravelplanner-api .
      - name: Build AIService image
        run: docker build -t aitravelplanner-ai ./AITravelPlanner.AIService
      - name: Build Frontend image
        run: docker build -t aitravelplanner-frontend ./AITravelPlanner.Frontend
