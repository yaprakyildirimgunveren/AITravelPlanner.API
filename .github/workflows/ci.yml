name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component: [dotnet, ai-service, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        if: matrix.component == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Restore
        if: matrix.component == 'dotnet'
        run: dotnet restore AITravelPlanner.API.sln
      - name: Build
        if: matrix.component == 'dotnet'
        run: dotnet build AITravelPlanner.API.sln -c Release --no-restore
      - name: Test
        if: matrix.component == 'dotnet'
        run: dotnet test AITravelPlanner.API.sln -c Release --no-build

      - name: Setup Python
        if: matrix.component == 'ai-service'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: matrix.component == 'ai-service'
        run: python -m pip install -r AITravelPlanner.AIService/requirements.txt
      - name: Compile
        if: matrix.component == 'ai-service'
        run: python -m compileall AITravelPlanner.AIService

      - name: Setup Node
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        if: matrix.component == 'frontend'
        run: npm install
        working-directory: AITravelPlanner.Frontend
      - name: Build
        if: matrix.component == 'frontend'
        run: npm run build
        working-directory: AITravelPlanner.Frontend

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f AITravelPlanner.API/Dockerfile -t aitravelplanner-api .
      - name: Build AIService image
        run: docker build -t aitravelplanner-ai ./AITravelPlanner.AIService
      - name: Build Frontend image
        run: docker build -t aitravelplanner-frontend ./AITravelPlanner.Frontend
